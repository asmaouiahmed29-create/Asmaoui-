kind = "web"
previewPath = "/"
title = "OptimDZ"
version = "1.0.0"
id = "artifacts/optimdz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21757

[services.development]
run = "pnpm --filter @workspace/optimdz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/optimdz", "run", "build" ]
publicDir = "artifacts/optimdz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21757"
BASE_PATH = "/"
